<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Syngled</title>
 
<style>
body{
    margin:0;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    background: linear-gradient(#ffffff,#d8e7f8bb);
}

nav{
    background:#00c8ff;
    padding:15px;
    text-align:center;
}
 
nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-weight:bold;
    font-size:18px;
}
 
header{
    text-align:center;
    padding:40px;
    color:#3abff8;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
 
section{
    padding:40px;
    text-align:center;
}
 
.cantores{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.cantores img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid #8fdfff;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.cantores img:hover{
    transform:scale(1.05);
}
</style>
</head>
 
<body>

<nav>
<a href="#inicio">Início</a>
<a href="#cantores">Bandas</a>
<a href="#sobre">Sobre o festival</a>
</nav>
 
<header id="inicio">
<h1>Syngled</h1>
<p>Festival de Musica mais atualizado!</p>
</header>
 

<section id="cantores">
 
   
<h2>Bandas que estarão no festival</h2>
 
<div class="cantores">

    <div class="card">
      <img src="https://i.scdn.co/image/ab67616d00001e025a0c2870f4f309e382d1fad6">
      <p>Chase Atlantic</p>
    </div>
  
    <div class="card">
      <img src="https://i.scdn.co/image/ab67616100005174df0b5ac84376a0a4b2166816">
      <p>The Neighbourhood</p>
    </div>
  
    <div class="card">
      <img src="https://uploads.tenhomaisdiscosqueamigos.com/2013/07/arctic-monkeys-am.jpg">
      <p>Arctic Monkeys</p>
    </div>
  
  </div>
</section> 
</body>
</html>
